name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  check:
    strategy:
      matrix:
        node: [ 22, 23 ]
    runs-on: ubuntu-latest
    name: Astro Check for Node.js ${{ matrix.node }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ matrix.node }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Astro Check
        run: pnpm astro check

  build:
    needs: check
    strategy:
      matrix:
        node: [ 22, 23 ]
    runs-on: ubuntu-latest
    name: Astro Build for Node.js ${{ matrix.node }}
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4.3.0
        with:
          node-version: ${{ matrix.node }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set environment variables
        run: |
          if [ -n "${{ secrets.SECRET_GITHUB_API_CACHE_SIG_KEY }}" ]; then
            echo "SECRET_GITHUB_API_CACHE_SIG_KEY=${{ secrets.SECRET_GITHUB_API_CACHE_SIG_KEY }}" >> $GITHUB_ENV
          else
            echo "SECRET_GITHUB_API_CACHE_SIG_KEY=cff5cc1295d6454fec2f95d22226087749493cd1761a8a32bbd9407100c3c90c" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.SECRET_GITHUB_API_CACHE_PAT }}" ]; then
            echo "SECRET_GITHUB_API_CACHE_PAT=${{ secrets.SECRET_GITHUB_API_CACHE_PAT }}" >> $GITHUB_ENV
          fi

      - name: Run Astro Build
        run: pnpm astro build

      - name: Upload build artifact
        uses: actions/upload-artifact@5d5d22a31266b76f8d14eab2dea4de9b5c2e9ad2 # v4.6.2
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@fa666a3265e4d0563c101b7e5d15f8d7d6fb03d9 # v4.3.0
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@98c0635e9877b8dae6610f2192994b3e8b0e1f86
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fuwari
          directory: dist
          waitForSuccess: true
